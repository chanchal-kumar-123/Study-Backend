<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.7.6/axios.min.js"></script>
    <script>
       async function sendRequest(){
            const a = document.getElementById("a").value;
            const b = document.getElementById("b").value;

           const response = await axios.post("http://localhost:3001/sum" ,{
                a:a,
                b:b
            })
           document.getElementById("result").innerText =  JSON.stringify(response.data);
        }
    </script>
</head>
<body id="body">
    <input id="a" type="text" placeholder="First Number"></input>
    <input id="b" type="text" placeholder="Second Number"></input>
    <button onclick="sendRequest()">Find Sum</button>
    <div id="result"></div>
</body>
</html>
